name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package tarball
        run: |
          BIN=mouseless
          TAG=${GITHUB_REF_NAME}
          strip "target/${{ matrix.target }}/release/$BIN" || true
          tar -czf "$BIN-$TAG-${{ matrix.target }}.tar.gz" -C "target/${{ matrix.target }}/release" "$BIN"
          shasum -a 256 "$BIN-$TAG-${{ matrix.target }}.tar.gz" > "$BIN-$TAG-${{ matrix.target }}.tar.gz.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            mouseless-*.tar.gz
            mouseless-*.sha256

  release:
    name: github release
    needs: build
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Combined checksums
        run: |
          cd dist
          cat *.sha256 > SHA256SUMS
          ls -la
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/mouseless-*.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true

  publish-crate:
    name: cargo publish
    needs: release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}
